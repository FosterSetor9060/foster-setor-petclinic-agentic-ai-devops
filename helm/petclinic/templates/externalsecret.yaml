{{- if .Values.externalSecrets.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# ExternalSecret: RDS credentials
#
# Syncs foster-petclinic/rds-credentials from AWS Secrets Manager.
# The resulting k8s Secret contains: host, port, dbname, username, password,
# jdbc_url — consumed by customers-service, vets-service, and visits-service.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "petclinic.fullname" . }}-rds-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petclinic.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.eso.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.eso.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "petclinic.fullname" . }}-rds-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.eso.rdsSecretName }}
---
# ──────────────────────────────────────────────────────────────────────────────
# ExternalSecret: OpenAI API key
#
# Syncs foster-petclinic/openai-api-key from AWS Secrets Manager.
# The resulting k8s Secret contains: OPENAI_API_KEY — consumed by genai-service.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "petclinic.fullname" . }}-openai-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petclinic.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.eso.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.eso.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "petclinic.fullname" . }}-openai-key
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.eso.openaiSecretName }}
{{- end }}
